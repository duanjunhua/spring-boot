spring.application.name=springboot3

# --- \u670D\u52A1\u914D\u7F6E ---
# \u8BBE\u7F6E\u7F16\u7801
server.servlet.encoding.charset=UTF-8
# \u5173\u95ED\u542F\u52A8\u4FE1\u606F\u65E5\u5FD7
spring.main.log-startup-info=false
# \u662F\u5426\u5EF6\u8FDF\u52A0\u8F7Dbean\uFF0C\u9ED8\u8BA4\u60C5\u51B5\u4E0B\u4E0D\u542F\u7528\u5EF6\u8FDF\u521D\u59CB\u5316
spring.main.lazy-initialization=false
# \u63A7\u5236banner\u8F93\u51FA\uFF08console\uFF1A\u8F93\u51FA\u63A7\u5236\u53F0\u3001log\uFF1A\u8F93\u51FA\u5230\u65E5\u5FD7\u3001off\uFF1A\u76F4\u63A5\u5173\u95ED\u4E0D\u8F93\u51FA\uFF09
spring.main.banner-mode=console


# --- MySQL\u6570\u636E\u5E93 ---
# \u6570\u636E\u5E93\u5730\u5740
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/demo
# \u6570\u636E\u5E93\u8D26\u53F7\u5BC6\u7801
spring.datasource.username=root
spring.datasource.password=root
# \u6570\u636E\u5E93\u8FDE\u63A5\u7C7B
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
# \u9A8C\u8BC1\u6570\u636E\u5E93\u8868\u7ED3\u6784, \u6B63\u5F0F\u73AF\u5883\u6CE8\u91CA
#spring.jpa.hibernate.ddl-auto=create
# \u683C\u5F0F\u5316SQL
spring.jpa.properties.hibernate.format_sql=true
# \u4E3B\u8981\u662F\u6307\u5B9A\u751F\u6210\u8868\u540D\u7684\u5B58\u50A8\u5F15\u64CE\u4E3A InnoDBD
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# --- Redis\u6570\u636E\u5E93 ---
# \u6570\u636E\u5E93\u7D22\u5F15
spring.data.redis.database=0
# \u670D\u52A1\u5668\u5730\u5740
spring.data.redis.host=127.0.0.1
# \u670D\u52A1\u5668\u7AEF\u53E3
spring.data.redis.port=6379
# \u670D\u52A1\u5668\u8FDE\u63A5\u5BC6\u7801
spring.data.redis.password=123456
# \u8FDE\u63A5\u6C60\u6700\u5927\u8FDE\u63A5\u6570\uFF0C\u9ED8\u8BA48
spring.data.redis.lettuce.pool.max-active=10
# \u8FDE\u63A5\u6C60\u6700\u5927\u963B\u585E\u7B49\u5F85\u65F6\u95F4\uFF08\u4F7F\u7528\u8D1F\u503C\u8868\u793A\u6CA1\u6709\u9650\u5236\uFF09\uFF0C\u9ED8\u8BA4-1
spring.data.redis.jedis.pool.max-wait=-1
# \u8FDE\u63A5\u6C60\u4E2D\u7684\u6700\u5927\u7A7A\u95F2\u8FDE\u63A5\uFF0C\u9ED8\u8BA48
spring.data.redis.lettuce.pool.max-idle=8
# \u8FDE\u63A5\u6C60\u4E2D\u7684\u6700\u5C0F\u7A7A\u95F2\u8FDE\u63A5\uFF0C\u9ED8\u8BA40
spring.data.redis.lettuce.pool.min-idle=2

# --- Thymeleaf ---
# static\u76EE\u5F55\u7528\u4E8E\u653E\u7F6E\u7F51\u7AD9\u7684\u9759\u6001\u5185\u5BB9\u5982 css\u3001js\u3001\u56FE\u7247\uFF1Btemplates \u76EE\u5F55\u7528\u4E8E\u653E\u7F6E\u9879\u76EE\u4F7F\u7528\u7684\u9875\u9762\u6A21\u677F
# \u6A21\u677F\u70ED\u90E8\u7F72\u3001\u7981\u7528 thymeleaf \u7F13\u5B58\uFF0C\u4E0D\u7136\u5728\u5F00\u53D1\u8FC7\u7A0B\u4E2D\u4FEE\u6539\u9875\u9762\u4E0D\u4F1A\u7ACB\u523B\u751F\u6548\u9700\u8981\u91CD\u542F
spring.thymeleaf.cache=false
# \u8BBE\u7F6E\u4E0D\u6821\u9A8Chtml\u6807\u7B7E\uFF0C\u9700\u8981\u5F15\u5165nekohtml\u4F9D\u8D56
spring.thymeleaf.mode=LEGACYHTML5


# --- MybatisPlus\uFF1A\u76F8\u5173\u5C5E\u6027\u53EF\u67E5\u770BMybatisPlusProperties\u7C7B ---
# \u6CE8\u610F\uFF1A\u914D\u7F6Emybatis xml\u6587\u4EF6\u4F4D\u7F6Eclasspath\u6307\u4EE3resources\u76EE\u5F55\u6216\u8005java\u76EE\u5F55\u4E0B
# mybatis-plus\u914D\u7F6E\u6587\u4EF6\u6240\u5728\u4F4D\u7F6E
mybatis-plus.config-location=classpath:mybatisconfig.xml
# mybatis-plus mapper \u6587\u4EF6\u6240\u5728\u4F4D\u7F6E
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.duanjh.mybatisplus.entity

# --- RabbitMQ ---
# \u5730\u5740\u7AEF\u53E3
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
# \u8D26\u53F7\u5BC6\u7801
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
# \u914D\u7F6E\u53D1\u9001\u5BF9\u8C61\u6D88\u606F\u5E8F\u5217\u5316\u95EE\u9898
spring.rabbitmq.listener.simple.trust-all=true
spring.amqp.deserialization.trust.all=true

